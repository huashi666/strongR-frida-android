name: strongR-frida

on:
  workflow_dispatch:

jobs:
  android_build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1.0.6
      with:
        ndk-version: r25b

    - name: Set up Python 3.9
      uses: actions/setup-python@v5.1.0
      with:
        python-version: '3.9'

    - name: install dependencies
      run: |
        sudo apt-get update && DEBIAN_FRONTEND=noninteractive sudo apt-get install build-essential tree ninja-build gcc-multilib g++-multilib lib32stdc++-9-dev flex bison ruby ruby-dev python3-requests python3-setuptools python3-dev python3-pip libc6-dev libc6-dev-i386 -y
        sudo gem install fpm -v 1.11.0 --no-document
        python3 -m pip install lief graphlib

    - name: Pull Frida Latest Release Version
      id: fridaVersion
      run: |
        FRIDA_VERSION=$(curl -s https://api.github.com/repos/frida/frida/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
        echo "FRIDA_VERSION=$FRIDA_VERSION" >> $GITHUB_OUTPUT
        echo "Frida version: $FRIDA_VERSION"

    - name: build frida for Android
      shell: bash
      run: |
        git config --global user.name "huashi666"
        git config --global user.email "huashi666@users.noreply.github.com"
        export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}

        git clone https://github.com/hluwa/Patchs.git

        git clone --recurse-submodules https://github.com/frida/frida
        cd frida

        for path in ../Patchs/strongR-frida/*
        do
          name=$(basename $path)
          echo "Apply patches to frida/subprojects/$name"
          cd subprojects/$name
          git am ../../../Patchs/strongR-frida/$name/*.patch || echo "Patch failed for $name"
          cd ../..
        done
        cd ..

        ARCHES="android-arm android-arm64 android-x86 android-x86_64"
        for ARCH in $ARCHES
        do
          echo "Building for $ARCH..."
          mkdir build-$ARCH
          cd build-$ARCH
          ../frida/configure --host=$ARCH
          make
          cd ..
        done

    - name: package build result
      run: |
        mkdir -p output
        for ARCH in android-arm android-arm64 android-x86 android-x86_64
        do
          [ -f build-$ARCH/subprojects/frida-core/server/frida-server ] && cp build-$ARCH/subprojects/frida-core/server/frida-server output/hluda-server-${{ steps.fridaVersion.outputs.FRIDA_VERSION }}-$ARCH && gzip output/hluda-server-${{ steps.fridaVersion.outputs.FRIDA_VERSION }}-$ARCH
          [ -f build-$ARCH/subprojects/frida-core/inject/frida-inject ] && cp build-$ARCH/subprojects/frida-core/inject/frida-inject output/hluda-inject-${{ steps.fridaVersion.outputs.FRIDA_VERSION }}-$ARCH && gzip output/hluda-inject-${{ steps.fridaVersion.outputs.FRIDA_VERSION }}-$ARCH
          [ -f build-$ARCH/subprojects/frida-core/lib/gadget/frida-gadget.so ] && cp build-$ARCH/subprojects/frida-core/lib/gadget/frida-gadget.so output/hluda-gadget-${{ steps.fridaVersion.outputs.FRIDA_VERSION }}-$ARCH.so && gzip output/hluda-gadget-${{ steps.fridaVersion.outputs.FRIDA_VERSION }}-$ARCH.so
        done
        ls -la output/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: strongR-frida-android-${{ steps.fridaVersion.outputs.FRIDA_VERSION }}
        path: output/*
        retention-days: 90

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.fridaVersion.outputs.FRIDA_VERSION }}
        name: strongR-frida ${{ steps.fridaVersion.outputs.FRIDA_VERSION }}
        files: output/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
